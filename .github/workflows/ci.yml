name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      MPLCONFIGDIR: /tmp/matplotlib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile scripts
        run: python -m compileall scripts/examples

      - name: Run global trend figure script
        run: |
          python scripts/examples/plot_aerosol_loss_vs_new_generation.py \
            --output-dir /tmp
          test -f /tmp/aerosol_loss_vs_new_generation_global.png

      - name: Run 2023 country figure script
        run: |
          python scripts/examples/plot_country_aerosol_loss_2023.py \
            --output-dir /tmp \
            --table-dir /tmp
          test -f /tmp/country_aerosol_loss_bar_revise.png
          test -f /tmp/country_aerosol_loss_top30_2023.csv
